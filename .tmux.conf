# set first window to index 1 (not 0) to map more to the keyboard layout
set -g base-index 1
set -g pane-base-index 1

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file
bind r source-file ~/.tmux.conf

# swtich panes 
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# switching between panes using alt+arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# enable mouse control
set -g mouse on

# use shift + arrow key to move between windows in a session
# bind -n S-left previous-window
# bind -n S-right next-window

# use alt + pageUp/pageDown key to move between windows in a session
bind -n M-pageDown previous-window
bind -n M-pageUp next-window

# Change thick border
set-option -g pane-active-border-style "bg=red"
set-option -ag pane-active-border-style "fg=black"

# Set vim mode
set -g mode-keys vi

# Tmux buffer config
bind-key -T copy-mode-vi y send-keys -X copy-pipe "xclip -r" \; display-message "Copied to selection"
bind-key -T copy-mode-vi Y send-keys -X copy-pipe "xclip -r -selection clipboard" \; display-message "Copied to clipboard"
bind-key C-p run-shell "xclip -o | tmux load-buffer - && tmux paste-buffer"


# Chage some config warning in vim
set-option -sg escape-time 10
#set-option -g default-terminal "screen-256color"


# Define my custom menu bar
  # status bar colors
  set -g status-bg black
  set -g status-fg white

  # alignment settings
  set-option -g status-justify centre

  # window list options
  setw -g automatic-rename on
  set-window-option -g window-status-format '#[fg=cyan,dim]#I#[fg=blue]:#[default]#W#[fg=grey,dim]#F'
  set-window-option -g window-status-current-format '#[bg=blue,fg=cyan,bold]#I#[bg=blue,fg=cyan]:#[fg=colour230]#W#[fg=dim]#F'
  set -g base-index 1

